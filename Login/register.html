<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animax</title>
    <link rel="stylesheet" href="stylerg.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
</head>
<body>
    <section class="auth-page">
        <h1 id="titulo">ANIMAX</h1>
        <main>
            <div>
                <img src="imagens/logo.png" alt="" id="logo">
            </div>
            <h2>Criar conta</h2>
            <p id="desc">Junte-se a comunidade de animes</p>
            <form action="" method="post" autocomplete="off">
                <div class="input-group">
                    <label for="iusuario">Nome de usúario</label>
        
                        <i class="fa-regular fa-user"></i>
                        <input type="text" name="usuario" id="iusuario" required placeholder="Nome de usúario">
        
                    <br>
                    <label for="iemail">Email</label>
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="email" id="iemail" required placeholder="E-mail">
                    <br>
                    <label for="isenha">Senha</label>
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="senha" id="isenha" placeholder="Senha">
                    <i class="fa-regular fa-eye toggle-password eye-senha" data-target="isenha"></i>
                    <br>
                    <label for="iconfsenha">Confirmar senha</label>
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" name="confsenha" id="iconfsenha" placeholder="Confirmar senha">
                    <i class="fa-regular fa-eye icon-eye toggle-password eye-confirmar" data-target="iconfsenha"></i>
                    </div>
                    <button type="submit">
                        CRIAR CONTA
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
                <section class="divisao">
                    <div></div>
                    <p>ou</p>
                    <div></div>
                </section>
                <p>Já tem uma conta? <a href="login.html">Entrar</a></p>
        
        </main>
        <p id="copyright">© 2026 Animax. Todos os direitos resevados.</p>
    </section>

    <script src="scriptrg.js"></script>
</body>
</html>
