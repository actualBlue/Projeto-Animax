<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animax</title>
    <link rel="stylesheet" href="stylefgt.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <section class="auth-page">
        <h1 id="titulo">ANIMAX</h1>
        <main>
            <div>
                <img src="imagens/logo.png" alt="" id="logo">
            </div>
                <h2>Esqueceu sua senha?</h2>
                <p id="desc">Informe o e-mail da sua conta e enviaremos um link para redefinir sua senha.</p>
                <form action="" method="post" autocomplete="off">
                    <div class="input-group">
                        <label for="iemail">Email</label>
        
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" name="email" id="iemail" required placeholder="Email">
                        <br>
                        <button type="submit">
                            ENVIAR LINK
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>
                    <section class="divisao">
                        <div></div>
                        <p>ou</p>
                        <div></div>
                    </section>
                    <p>Voltar para <a href="login.html">Login</a></p>
        </main>
        <p id="copyright">© 2026 Animax. Todos os direitos resevados.</p>
    </section>
</body>
</html>
